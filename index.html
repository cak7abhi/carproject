<!doctype html>
<html>
    <head>
        <title>
            cak7
        </title>
      <style>
body{
    text-align: center;
    transform: 0.4;
}
body.light{
    background-color: rgb(254, 178, 182);
    color: black;
}
body.dark{
    background-color: black;
    color: white;
}
body.light .card{
    background-color: rgb(8, 3, 3);
    color: rgb(244, 244, 248);
}
button{
    background-color: rgb(234, 10, 10);
    border-radius: 20px;
    padding: 9px;
    margin-top: 20px;
    margin-bottom: 20px;
    color: white;
    width: 140px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover{
    background-color: rgb(235, 108, 108);
    box-shadow: 0 0 13px rgb(165, 58, 58);
    transform: scale(1.05);
}
input{
    padding: 8px;
    width: 250px;
    border: 2px solid rgb(210, 12, 12);
    background-color: rgb(176, 176, 235) ;
    border-radius: 20px;
    margin-bottom: 15px;
}

#result{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card{
    border: 3px solid red;
    width: 180px;
    background-color: rgba(245, 245, 62, 0.866);
    padding: 10px;
    margin: 20px;
    transition: 0.4s;
}
.card:hover{
    box-shadow: 0 0 50px rgb(248, 4, 4);
    transform: scale(1.05);
}
img{
    width: 100%;
}
#list {
    background-color: grey;
    width: 300px;
    margin: 20px auto;   /* ✅ THIS CENTERS */
    padding: 10px;
    border-radius: 10px;
}

@media(max-width: 600px){
    .card{
        width: 90%;
    }
}

      </style>
    </head>
    <body class="dark">
        <h1>Abhi7 movie</h1>
        <button onclick="tagglemode()">Dark | light red</button>

        <h2>Movie: search</h2>
        <input id="search" placeholder="enter movie" oninput="addmovie()">
        <div id="result"></div>
        <h3>Add List</h3>
        <div id="list"></div>
        <h3>contact:9391773648</h3>
        <h3>abhinay@gmail</h3>

        <script>
let favourite = JSON.parse(localStorage.getItem("myfav")) || [];
let mode = localStorage.getItem("mode") || "dark";
let timer;

document.body.className= mode;
showme();

function tagglemode(){
    if(document.body.classList.contains("dark")){
        document.body.classList.remove("dark");
        document.body.classList.add("light");
        localStorage.setItem("mode", "light");
    }
    else{
        document.body.classList.remove("light");
        document.body.classList.add("dark");
        localStorage.setItem("mode", "dark");
    }
}
async function addmovie(){
    let name =document.getElementById("search").value;
 if(name.length <3){
    document.getElementById("result").innerHTML= "";
    return;
 }
 clearTimeout(timer);
 timer=setTimeout(async function(){
 document.getElementById("result").innerHTML = "wait, Loading";
 let url = "https://www.omdbapi.com/?apikey=58cdd56b&s=" + name;

 let res = await fetch(url);
 let data = await res.json();

 let text = "";

 if(data.Respons === "False"){
    text = "no movie found";
 }
 else{
    data.Search.forEach(function(movie){
        let poster = movie.Poster !== "N/A"
        ?movie.Poster
        : "https://via.placeholder.com/200";

        text = text + ` <div class = "card">
        <a href = "https://www.imdb.com/title/${movie.imdbID}"target="_blank">
        <img src="${poster}"></a>
        <p><br>${movie.Title}<br></p>
        <p>${movie.Year}</p>
         
        <button onclick = 'addlist("${movie.Title}")'>Add list</button>
        </div>
        `;
    })
 }
 document.getElementById("result").innerHTML= text; 
},450);
}
function addlist(title){
    if(!favourite.includes(title)){
        favourite.push(title);
        localStorage.setItem("myfav", JSON.stringify(favourite));
        alert("my favourite add");
    }
}
function showme(){
 let text = "";

 favourite.forEach(function(item){
    text = text + "<p>" + item + "</p>";

    document.getElementById("list").innerHTML = text; 
 })
}

        </script>
    </body>
</html>
