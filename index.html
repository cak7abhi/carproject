<!DOCTYPE html>
<html>
<head>
    <title>cak7</title>
    <style>
        body{
            background-color: black;
            background-size: cover;
            text-align: center;
            color: rgb(247, 224, 12);
        }
        input{
            background-color: rgb(224, 134, 134);
            padding: 7px;
            margin-right: 7px;
            border-radius: 20px;
            border: 3px solid blue;
            width: 200px;
        }
        button{
            background-color: blue;
            color: white;
            padding: 7px;
            border-radius: 20px;
            width: 60px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover{
            background-color: rgb(46, 150, 225);
        }

        #result{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card{
            background-color: rgba(0, 0, 0, 0.685);
             margin: 25px;
            border: 4px solid yellow;
            width: 230px;
            padding: 20px;
            transition: 0.2s;
        }
        .card:hover{
            transform: scale(1.07);
            box-shadow: 0 0 30px blue;
        }
        img{
            width: 100%;
        }

        /* MOBILE DESIGN */
@media (max-width: 600px){

h1{
font-size: 20px;
}

input{
width: 70%;
}

.card{
width: 90%;
}

#result{
flex-direction: column;
align-items: center;
}

}


    </style>
</head>
<body>
    <h1>Abhi7 movies app7</h1>
    <p>enjoy watching movies at home</p>

    <h2>Movie Search</h2>
    <input id="search" placeholder="enter movies">
    <button onclick="addmovie()">Click</button>

    <div id="result"></div>

    <h3>Listed</h3>
    <div id="list"></div>

<script>
let save = JSON.parse(localStorage.getItem("myyfav")) || [];

showFav();

async function addmovie(){
    let name = document.getElementById("search").value;

    if(name === ""){
        document.getElementById("result").innerHTML = "please enter movie";
        return;
    }

    document.getElementById("result").innerHTML = "loading...";

    let url = "https://www.omdbapi.com/?apikey=58cdd56b&s=" + name;

    let res = await fetch(url);
    let data = await res.json();

    let text = "";

if(data.Search){
    data.Search.forEach(function(movie){
        let poster = movie.Poster !== "N/A"
        ? movie.Poster
        : "https://via.placeholder.com/200";

        text += `<div class="card">
            <a href="https://www.imdb.com/title/${movie.imdbID}" target="_blank">
<img src="${poster}">
</a>
            <p>${movie.Title}</p>
            <p>${movie.Year}</p> 
            <button onclick='addFav("${movie.Title}")'>add list</button>
        </div>`;
    });
}else{
    text = "no movie found";
}

    document.getElementById("result").innerHTML = text;
}

function addFav(title){
    if(!save.includes(title)){
        save.push(title);
        localStorage.setItem("myyfav", JSON.stringify(save));
        showFav();
        alert("my favourite");
    }
}

function showFav(item){
    let text = "";

    save.forEach(function(item){
        text = text + "<p>" + item + "</p>";
    });
    document.getElementById("list").innerHTML = text;
}
</script>

</body>
</html>
