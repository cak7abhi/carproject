<!DOCTYPE html>
<html>
<head>
<title>Abhi7 Movies App</title>

<style>

body{
font-family: Arial;
text-align: center;
margin: 0;
transition: 0.3s;
}

/* DARK MODE (default) */
body.dark{
background: black;
color: white;
}

/* LIGHT MODE */
body.light{
background: #f2f2f2;
color: black;
}

/* input */
input{
padding: 10px;
border-radius: 20px;
width: 250px;
}

/* buttons */
button{
padding: 6px;
margin: 5px;
border-radius: 15px;
cursor: pointer;
}

/* cards */
.card{
border: 2px solid red;
padding: 10px;
margin: 10px;
width: 200px;
background-color: rgba(0,0,0,0.7);
transition: 0.3s;
}

body.light .card{
background-color: white;
color: black;
}

.card:hover{
transform: scale(1.05);
box-shadow: 0 0 15px yellow;
}

img{
width: 100%;
}

/* layout */
#result{
display: flex;
flex-wrap: wrap;
justify-content: center;
}

#favList{
margin-top: 20px;
}

/* mobile */
@media (max-width: 600px){
.card{
width: 90%;
}
}

</style>

</head>

<body class="dark">

<h1>Abhi7 Movies App 🎬</h1>

<button onclick="toggleMode()">🌙 / ☀️</button>

<p>Enjoy watching movies at home</p>

<input id="search" placeholder="Enter movie name" oninput="searchMovie()">

<div id="result"></div>

<h2>My Favorites ❤️</h2>
<div id="favList"></div>

<script>

let favorites = JSON.parse(localStorage.getItem("fav")) || [];
let mode = localStorage.getItem("mode") || "dark";
let timer; 

// apply saved mode
document.body.className = mode;

showFav();

// DARK / LIGHT TOGGLE
function toggleMode(){

if(document.body.classList.contains("dark")){
document.body.classList.remove("dark");
document.body.classList.add("light");
localStorage.setItem("mode", "light");
}
else{
document.body.classList.remove("light");
document.body.classList.add("dark");
localStorage.setItem("mode", "dark");
}

}

// LIVE SEARCH
async function searchMovie(){

let name = document.getElementById("search").value;

if(name.length < 3){
document.getElementById("result").innerHTML = "";
return;
}

clearTimeout(timer);

timer = setTimeout(async function(){

document.getElementById("result").innerHTML = "Loading...";

let url = "https://www.omdbapi.com/?apikey=58cdd56b&s=" + name;

let res = await fetch(url);
let data = await res.json();

let text = "";

if(data.Response === "False"){
text = "No movies found";
}
else{

data.Search.forEach(function(movie){

let poster = movie.Poster !== "N/A"
? movie.Poster
: "https://via.placeholder.com/200";

text = text + `
<div class="card">
<a href="https://www.imdb.com/title/${movie.imdbID}" target="_blank">
<img src="${poster}">
</a>
<p><b>${movie.Title}</b></p>
<p>${movie.Year}</p>
<button onclick='addFav("${movie.Title}")'>❤️ Favorite</button>
</div>
`;

});

}

document.getElementById("result").innerHTML = text;

}, 350);

}

// ADD FAVORITE
function addFav(title){

if(!favorites.includes(title)){
favorites.push(title);
localStorage.setItem("fav", JSON.stringify(favorites));
showFav();
alert("Added ❤️");
}

}

// SHOW FAVORITES
function showFav(){

let text = "";

favorites.forEach(function(item){
text = text + "<p>" + item + "</p>";
});

document.getElementById("favList").innerHTML = text;

}

</script>

</body>
</html>
