<!DOCTYPE html>
<html>
<head>
<title>abhi7</title>

<style>
body{
background-image:url("https://img.freepik.com/premium-photo/huge-audience-is-watching-movie-movie-theatre-with-front-rear-views_973144-8332.jpg");
color: rgb(238, 238, 230);
text-align: center;
font-family: Arial;
background-size: cover;
padding-bottom: 50px;
}

.card{
border: 2px solid red;
padding: 10px;
margin: 10px;
width: 200px;
background-color: rgba(0,0,0,0.7);
}

img{
width: 100%;
}

input{
background-color: white;
color: black;
padding: 5px;
width: 150px;
border-radius: 15px;
}

button{
background-color: yellow;
color: black;
width: 90px;
border-radius: 15px;
padding: 5px;
margin-left: 5px;
}

button:hover{
background-color: orange;
}

#result{
display: flex;
flex-wrap: wrap;
justify-content: center;
}

.bottom{
.bottom{
margin-top: 40px;
padding: 20px;
background-color: rgba(0,0,0,0.8);
color: white;
}
}
</style>
</head>

<body>

<h1>Abhi7 Movies App</h1>
<p>Enjoy watching movies at home</p>

<input id="search" placeholder="Enter movie">
<button onclick="addmovies()">Search</button>
<div id="result"></div>
<div class="bottom">
<p>Contact: 94354359453</p>
<p>abhinay@gmail.com</p>
</div>

<script>

async function addmovies(){

let name = document.getElementById("search").value;

if(name === ""){
document.getElementById("result").innerHTML = "Please enter movie name";
return;
}

let url = "https://www.omdbapi.com/?apikey=58cdd56b&s=" + name;

let res = await fetch(url);
let data = await res.json();

let text = "";

if(data.Search){

data.Search.forEach(function(movie){

text = text + `
<div class="card">
<img src="${movie.Poster}">
<p><b>${movie.Title}</b></p>
<p>${movie.Year}</p>
</div>
`;

});

}
else{
text = "No movies found";
}

document.getElementById("result").innerHTML = text;

}

</script>

</body>
</html>
